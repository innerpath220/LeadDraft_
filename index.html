<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=docs/index.html" />
    <title>caveman</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1115;
        --panel: #161a22;
        --text: #f4f0e8;
        --muted: #a9b0bf;
        --accent: #f3c969;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: radial-gradient(circle at top, #1d232f 0%, var(--bg) 55%);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        max-width: 720px;
        width: min(720px, 100%);
        background: color-mix(in srgb, var(--panel) 88%, black);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3.5rem);
        letter-spacing: -0.04em;
      }

      p {
        margin: 0 0 16px;
        line-height: 1.6;
        color: var(--muted);
      }

      a {
        color: var(--accent);
      }

      .hint {
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>caveman</h1>
      <p>Redirect to the site in <code>docs/index.html</code>.</p>
      <p class="hint">
        If redirect fail, open <a href="docs/index.html">docs/index.html</a> directly.
      </p>
    </main>
  </body>
</html>
